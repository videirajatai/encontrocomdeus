<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições Encerradas</title>
    
    <link rel="icon" href="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png">
    
    <style>
        

        :root {--secondary: #D4AF37;}
           
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            width: 140px;
            margin-bottom: 20px;
        }

        h1 {
            color: #b30000; /* Vermelho Videira */
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #555555;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="logo" src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Igreja Videira">
        <h1>Inscrições Encerradas</h1>
        <p>As vagas para este encontro já foram preenchidas.<br>Se programe para o próximo "Encontro com Deus" em 07/08/2026. Inscrições serão abertas no dia 05/07/2026<br><br> Para mais informações entre em contato com a secretaria.</p>
        <p><a href="https://www.videirajatai.com.br" class="btn-grande" style="background: var(--secondary); color: var(--text-main);"><br><br>Voltar ao Site <i class="fas fa-arrow-right"></i></a></p>
    </div>

</body>
</html>
